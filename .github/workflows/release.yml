name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing protected SemVer tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Release / build exact artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout protected tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
      - name: Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.0
          cache: npm
      - name: Install
        run: npm ci --ignore-scripts
      - name: Validate tag and source
        run: |
          node scripts/validate-release.mjs --tag "${{ inputs.tag }}"
          npm run check
          node scripts/check-version-available.mjs
      - name: Pack once and smoke exact tarball
        run: node scripts/pack-release.mjs --output release
      - name: Upload immutable candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate
          path: release/
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: Release / GitHub
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout metadata
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release
      - name: Verify checksum
        run: node scripts/verify-release.mjs release
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            mkdir -p existing-release
            gh release download "${{ inputs.tag }}" --dir existing-release
            node scripts/verify-release.mjs existing-release
            cmp release/SHA256SUMS existing-release/SHA256SUMS
            cmp release/release-manifest.json existing-release/release-manifest.json
            cmp release/*.tgz existing-release/*.tgz
          else
            gh release create "${{ inputs.tag }}" release/* --verify-tag --generate-notes
          fi

  npm:
    name: Release / npm trusted publishing
    needs: [build, github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout identity
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
      - name: Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org
      - name: Use provenance-capable npm
        run: npm install --global npm@11.5.1
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release
      - name: Verify OIDC identity and checksum
        run: |
          node scripts/validate-release.mjs --tag "${{ inputs.tag }}" --remote
          node scripts/verify-release.mjs release
      - name: Publish exact tarball without token fallback
        run: npm publish ./release/*.tgz --access public --provenance
      - name: Verify registry provenance
        run: node scripts/verify-provenance.mjs
