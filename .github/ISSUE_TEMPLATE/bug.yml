name: Defecto
description: Reporta comportamiento reproducible incorrecto
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: No publiques secretos o vulnerabilidades explotables; usa SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Versión exacta
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options: [Windows, macOS, Linux, Otro]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual y esperado
      description: Incluye comando, salida redactada y resultado esperado.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproducción mínima
    validations:
      required: true
  - type: textarea
    id: recovery
    attributes:
      label: Recuperación o rollback probado

