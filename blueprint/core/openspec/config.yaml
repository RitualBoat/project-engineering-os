schema: spec-driven

context: |
  The repository is in environment bootstrap until the manual readiness gate starts product discovery.
  No product, framework, database, provider, deployment platform, or product architecture has been selected.

  Read AGENTS.md, docs/engineering/README.md, the active issue, the applicable master plan, and the bounded
  change context before creating artifacts. Current code/runtime/tests describe real state; active specs
  describe expected behavior; operating instructions describe process; Project and CI describe daily and
  automatic evidence. Archived changes are history, not automatic current policy.

  Use NORMAL mode for decisions and CAVEMAN only for mechanical work after design/spec approval. Preserve
  unrelated work, keep one large change active, never expose secrets, and keep external mutations,
  authentication, cost, license, branch protection, merge, and release behind explicit human gates.

rules:
  proposal:
    - "Reference the originating issue and affected master plan."
    - "State why, observable outcome, impact, dependencies, risks, rollback and explicit non-goals."
    - "Create one TLDR.md, one bounded brownfield-baseline.md and readiness metadata for every versionable change."
    - "Do not propose before `npm run sdd:ready:propose -- --issue <number>` passes without FAIL."
  specs:
    - "Write observable requirements with SHALL and scenarios with WHEN/THEN."
    - "Include applicable negative, degraded, permission, recovery and no-evidence cases."
    - "Do not select a product technology through a requirement unless an approved technical decision already exists."
  design:
    - "Name the bounded context, owners, invariants and cross-context contracts that are actually affected."
    - "Compare meaningful alternatives and document cost, maintenance, licenses, lock-in and developer capacity."
    - "Define evidence, compatibility, migration and rollback without inferring a distributed architecture."
  tasks:
    - "Keep tasks small, ordered and independently reviewable."
    - "Mark a task complete only after its named evidence exists."
    - "Include active-profile validations, negative cases, adversarial review, readiness and archive gates."
    - "Before archive run `npm run sdd:ready:archive -- --change <kebab-case> --run-local` and resolve every FAIL."
    - "Do not interpret missing, skipped or cancelled checks as success."
