name: Versioned change
description: Propose a non-trivial repository change after readiness.
title: "[Change] "
labels:
  - "type:change"
body:
  - type: textarea
    id: story
    attributes:
      label: Historia
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto y estado real
      description: Link current code, runtime, tests, active specs, and operating rules.
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Criterios observables y casos negativos
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencias, superficies y gates
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidencia automática y manual
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback y recuperación
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: No objetivos
    validations:
      required: true
  - type: textarea
    id: enriched_readiness
    attributes:
      label: Enriquecida y metadata de readiness
      description: Preserve both headings and marker. Replace placeholders; pending metadata cannot pass DoR.
      value: |
        ## Historia Original

        Conserva aquí el texto original sin reescribirlo.

        ## Enriquecida

        Añade contexto, criterios observables, dependencias, superficies, riesgos, evidencia, rollback y no objetivos.

        <!-- project-os-readiness:pre-propose
        {
          "schemaVersion": "1.0.0",
          "change": "replace-with-kebab-case",
          "execution": "versioned",
          "dependencies": [],
          "currentState": {
            "summary": "Replace with verified current behavior and drift.",
            "sources": [
              "Replace with an authoritative source."
            ]
          },
          "scope": [
            "Replace with one observable in-scope outcome."
          ],
          "observableCriteria": [
            "Replace with one criterion that can pass or fail."
          ],
          "owner": "Replace with accountable owner",
          "risks": [
            "Replace with one risk and document its mitigation."
          ],
          "surfaces": [
            "documentation"
          ],
          "manualInterventions": [],
          "costLicenseReview": {
            "status": "pending",
            "owner": "Replace with accountable owner",
            "evidence": null,
            "justification": "Complete before propose."
          },
          "evidence": {
            "automatic": [
              "openspec-strict"
            ],
            "manual": [
              "Replace with expected manual evidence."
            ]
          },
          "rollback": {
            "strategy": "Replace with bounded reversal.",
            "trigger": "Replace with observable trigger.",
            "recovery": "Replace with recovery verification."
          },
          "nonGoals": [
            "Replace with an explicit non-goal."
          ],
          "exceptions": []
        }
        project-os-readiness:pre-propose -->
    validations:
      required: true
  - type: checkboxes
    id: ready
    attributes:
      label: Readiness
      options:
        - label: No duplicate exists.
          required: true
        - label: Working tree is classified or isolated.
          required: true
        - label: Cost, license, permission, and secret gates are identified.
          required: true
