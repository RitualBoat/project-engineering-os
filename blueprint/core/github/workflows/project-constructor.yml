name: Project constructor advisory

on:
  pull_request:
    paths:
      - ".project-constructor/**"
      - ".project-os/**"
      - ".agents/workflows/opsx-*.md"
      - ".claude/**"
      - ".codex/**"
      - ".cursor/**"
      - ".github/**"
      - ".opencode/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "OPENCODE.md"
      - "docs/engineering/**"
      - "opencode.json"
      - "openspec/**"
      - "package-lock.json"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  constructor-advisory:
    name: Constructor advisory (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "20.20.0"
          - os: ubuntu-latest
            node: "22.22.0"
          - os: windows-latest
            node: "20.20.0"
          - os: windows-latest
            node: "22.22.0"
          - os: macos-latest
            node: "20.20.0"
          - os: macos-latest
            node: "22.22.0"
    env:
      CI: "true"
      DO_NOT_TRACK: "1"
      OPENSPEC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run project-os:sync:check
      - run: npm run project-os:opsx:check
      - run: npm run project-os:doctor:json
      - run: npm run debt:check
      - run: npm run openspec:validate

  signal-contract:
    name: Advisory signal contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          echo "This workflow is advisory because branch protection does not require it."
          echo "A failing job remains a failure; advisory status never converts a failure to success."
          echo "A skipped, cancelled, or absent constructor-advisory job is not success evidence."
          echo "Promotion to a required check needs a versioned policy, stable baseline, and rollback."
